<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Meeting-to-Execution Agent</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Custom CSS -->

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<!-- Navigation -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

<div class="container-fluid">

<a class="navbar-brand fw-bold"
href="/">

🤖 Meeting-to-Execution Agent

</a>

<button class="navbar-toggler"
type="button"
data-bs-toggle="collapse"
data-bs-target="#navbarNav">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse"
id="navbarNav">

<ul class="navbar-nav ms-auto">

<li class="nav-item">

<a class="nav-link {% if request.path=='/' %}active fw-bold{% endif %}"

href="/">

Home

</a>

</li>

<li class="nav-item">

<a class="nav-link {% if request.path=='/dashboard' %}active fw-bold{% endif %}"

href="/dashboard">

Dashboard

</a>

</li>

<li class="nav-item">

<a class="nav-link {% if request.path=='/workflow' %}active fw-bold{% endif %}"

href="/workflow">

Workflow

</a>

</li>

<li class="nav-item">

<a class="nav-link {% if request.path=='/today' %}active fw-bold{% endif %}"

href="/today">

Today's Plan

</a>

</li>

<li class="nav-item">

<a class="nav-link {% if request.path=='/followups' %}active fw-bold{% endif %}"

href="/followups">

Follow-ups

</a>

</li>

<li class="nav-item">

<a class="nav-link {% if request.path=='/team' %}active fw-bold{% endif %}"

href="/team">

Team

</a>

</li>

</ul>

</div>

</div>

</nav>

<div class="container mt-4">

{% block content %}

{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
