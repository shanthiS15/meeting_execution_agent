{% extends "base.html" %}

{% block content %}

<div class="text-center mb-5">

    <h1 class="fw-bold">

        📅 Today's Work Plan

    </h1>

    <p class="text-muted">

        AI-generated daily activities for every team member.

    </p>

</div>

<div class="row">

{% for item in plans %}

<div class="col-lg-6 mb-4">

<div class="card shadow-lg h-100">

<div class="card-header bg-success text-white">

<h4>

👤 {{ item.owner }}

</h4>

</div>

<div class="card-body">

<p>

<b>📋 Assigned Task</b>

</p>

<div class="alert alert-primary">

{{ item.task_name }}

</div>

<p>

<b>🎯 Today's Activity</b>

</p>

<div class="alert alert-warning">

{{ item.today_activity }}

</div>

</div>

</div>

</div>

{% endfor %}

</div>

{% endblock %}
