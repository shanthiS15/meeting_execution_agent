{% extends "base.html" %}

{% block content %}

<div class="text-center mb-5">

    <h1 class="fw-bold">

        👥 Team Members

    </h1>

    <p class="text-muted">

        Manage project members and their email addresses.

    </p>

</div>

<div class="row">

    <!-- Add Member -->

    <div class="col-lg-4">

        <div class="card shadow-lg p-4">

            <h3>

                ➕ Add Team Member

            </h3>

            <hr>

            <form
                method="POST"
                action="/add_member">

                <div class="mb-3">

                    <label class="form-label">

                        Member Name

                    </label>

                    <input
                        type="text"
                        class="form-control"
                        name="name"
                        required>

                </div>

                <div class="mb-4">

                    <label class="form-label">

                        Email Address

                    </label>

                    <input
                        type="email"
                        class="form-control"
                        name="email"
                        required>

                </div>

                <button
                    class="btn btn-primary w-100">

                    ➕ Add Member

                </button>

            </form>

        </div>

    </div>

    <!-- Member List -->

    <div class="col-lg-8">

        <div class="card shadow-lg">

            <div class="card-header bg-dark text-white">

                <h4>

                    Registered Members

                </h4>

            </div>

            <table class="table table-hover mb-0">

                <thead class="table-light">

                    <tr>

                        <th>Name</th>

                        <th>Email</th>

                    </tr>

                </thead>

                <tbody>

                {% for member in members %}

                    <tr>

                        <td>

                            👤 {{ member[1] }}

                        </td>

                        <td>

                            📧 {{ member[2] }}

                        </td>

                    </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
